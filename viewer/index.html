<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminator Trace Player</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/asciinema-player@3/dist/bundle/asciinema-player.css">
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --text: #eee;
    --text-dim: #8892b0;
    --accent: #e94560;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header {
    width: 100%;
    padding: 20px 24px;
    background: var(--surface);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header .subtitle { font-size: 13px; color: var(--text-dim); }
  .controls {
    margin-left: auto;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .btn {
    background: rgba(255,255,255,0.08);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
  }
  .btn:hover { background: rgba(255,255,255,0.14); }
  #drop-zone {
    margin-top: 80px;
    padding: 60px 40px;
    border: 2px dashed rgba(255,255,255,0.15);
    border-radius: 12px;
    text-align: center;
    max-width: 560px;
    width: 90%;
  }
  #drop-zone h2 { font-size: 22px; margin-bottom: 12px; }
  #drop-zone p { color: var(--text-dim); font-size: 14px; margin-bottom: 8px; }
  #drop-zone code {
    background: rgba(255,255,255,0.06);
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 12px;
  }
  #drop-zone.hidden { display: none; }
  #player-container {
    width: 100%;
    max-width: 960px;
    padding: 24px;
    display: none;
  }
  #player-container.active { display: block; }
  #player-container .meta {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 12px;
    text-align: center;
  }
  /* Override asciinema-player background to match our theme */
  .ap-wrapper { border-radius: 8px; overflow: hidden; }
</style>
</head>
<body>

<header>
  <h1>Terminator</h1>
  <span class="subtitle">Trace Player</span>
  <div class="controls">
    <input type="file" id="file-input" accept=".cast,.json" class="btn">
  </div>
</header>

<div id="drop-zone">
  <h2>Load a recording</h2>
  <p>Drag & drop a <code>.cast</code> file, use the file picker, or add <code>?url=path.cast</code></p>
  <p style="margin-top: 16px; font-size: 12px; color: var(--text-dim);">
    Export recordings with <code>terminal_export</code> in Terminator
  </p>
</div>

<div id="player-container">
  <div id="player"></div>
  <div id="meta" class="meta"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/asciinema-player@3/dist/bundle/asciinema-player.min.js"></script>
<script>
(function() {
  const dropZone = document.getElementById('drop-zone');
  const playerContainer = document.getElementById('player-container');
  const playerEl = document.getElementById('player');
  const metaEl = document.getElementById('meta');
  const fileInput = document.getElementById('file-input');

  function loadCast(content, filename) {
    dropZone.classList.add('hidden');
    playerContainer.classList.add('active');
    playerEl.innerHTML = '';

    // Parse header for metadata
    const firstLine = content.split('\n')[0];
    try {
      const header = JSON.parse(firstLine);
      const eventCount = content.trim().split('\n').length - 1;
      metaEl.textContent = `${header.width}x${header.height} | ${eventCount} events` +
        (filename ? ` | ${filename}` : '');
    } catch { /* not asciicast, that's ok */ }

    // Create a blob URL for the cast content
    const blob = new Blob([content], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);

    AsciinemaPlayer.create(url, playerEl, {
      theme: 'monokai',
      fit: 'width',
      rows: 40,
      autoPlay: false,
      speed: 1,
      idleTimeLimit: 3,
      poster: 'npt:0:0',
    });
  }

  // File input
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => loadCast(reader.result, file.name);
    reader.readAsText(file);
  });

  // Drag & drop
  document.addEventListener('dragover', (e) => e.preventDefault());
  document.addEventListener('drop', (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => loadCast(reader.result, file.name);
    reader.readAsText(file);
  });

  // URL param
  const urlParam = new URLSearchParams(window.location.search).get('url');
  if (urlParam) {
    fetch(urlParam)
      .then(r => r.text())
      .then(content => loadCast(content, urlParam.split('/').pop()))
      .catch(err => alert('Failed to load: ' + err.message));
  }
})();
</script>
</body>
</html>
